name: ShellCheck

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  lint:
    name: bash -n and ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -y shellcheck

      - name: Syntax check (bash -n)
        run: |
          set -e
          fail=0
          for f in aws-patch.sh install.sh lib/*.sh tests/*.sh scripts/*.sh; do
            [ -e "$f" ] || continue
            echo "Checking syntax: $f"
            if ! bash -n "$f"; then
              echo "::error file=$f::bash -n failed"
              fail=1
            fi
          done
          exit "$fail"

      - name: ShellCheck
        run: |
          shellcheck -x aws-patch.sh install.sh lib/*.sh tests/*.sh scripts/*.sh

      - name: Verify VERSION file is valid semver
        run: |
          version="$(cat VERSION)"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error file=VERSION::VERSION file '$version' is not valid semver"
            exit 1
          fi
          echo "VERSION OK: $version"
